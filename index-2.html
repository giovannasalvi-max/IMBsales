<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM IMB — Innovation Meeting Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F5F3EE; --surface: #FFFFFF; --surface2: #F0EDE6; --border: #E2DDD4;
  --text: #1A1814; --muted: #8A8478; --accent: #C8873A; --accent2: #2D5F3F;
  --danger: #C04040; --info: #2B4F8A; --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
input, select, textarea, button { font-family: 'DM Sans', sans-serif; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
.login-logo { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.login-title { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
.login-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 14px; font-size: 14px; color: var(--text); outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 0.05em; }
.login-box input:focus { border-color: var(--accent); }
.login-btn { width: 100%; background: var(--text); color: #F5F3EE; border: none; border-radius: var(--r); padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; }
.login-btn:hover { opacity: 0.85; }
.login-error { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }
#app { display: none; }
.header { background: var(--text); color: #F5F3EE; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.header-logo { font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.9; }
.header-sub { font-size: 11px; opacity: 0.5; font-family: 'DM Mono', monospace; }
.btn-logout { background: none; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: rgba(255,255,255,0.6); font-size: 12px; padding: 4px 10px; cursor: pointer; }
.btn-logout:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
.metrics-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); }
.metric { padding: 0.5rem 1rem; border-right: 1px solid var(--border); }
.metric:last-child { border-right: none; }
.metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; }
.metric-val { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; }
.toolbar { padding: 1rem 1.5rem; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
.toolbar-left { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
select, input[type="text"], input[type="date"], input[type="tel"], input[type="email"] { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 13px; color: var(--text); outline: none; }
select:focus, input:focus, textarea:focus { border-color: var(--accent); }
.btn-primary { background: var(--text); color: #F5F3EE; border: none; border-radius: var(--r); padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { opacity: 0.85; }
.table-wrap { padding: 0 1.5rem 1.5rem; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
thead { background: var(--surface2); }
th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.empty-row td { text-align: center; padding: 3rem; color: var(--muted); }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
.b-identificada { background: #E8E4DC; color: #5A5548; }
.b-abordada { background: #D6E8F5; color: #1A4A7A; }
.b-em-negociacao { background: #FAEBD0; color: #7A4A10; }
.b-proposta { background: #E8D6F5; color: #4A1A7A; }
.b-fechada { background: #D6F5E0; color: #1A5A30; }
.b-perdida { background: #F5D6D6; color: #7A1A1A; }
.btn-ver { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--info); }
.btn-ver:hover { background: #EEF3FB; }
.btn-del { background: none; border: none; padding: 4px 8px; font-size: 14px; cursor: pointer; color: var(--muted); border-radius: 6px; }
.btn-del:hover { background: #FBE8E8; color: var(--danger); }
.contact-info { font-size: 11px; color: var(--muted); margin-top: 2px; }
.contact-info a { color: var(--info); text-decoration: none; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(26,24,20,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-empresa { font-size: 17px; font-weight: 600; }
.modal-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.btn-close { background: var(--surface2); border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-body { padding: 1.25rem 1.5rem; }
.status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.status-row label { font-size: 12px; color: var(--muted); }
.ia-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.btn-ia { display: inline-flex; align-items: center; gap: 7px; border: none; border-radius: var(--r); padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn-ia:disabled { opacity: 0.5; cursor: default; }
.btn-ia-resumo { background: var(--text); color: #F5F3EE; }
.btn-ia-spin { background: #2D5F3F; color: #F5F3EE; }
.btn-ia:hover:not(:disabled) { opacity: 0.82; }
.ia-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.ia-dot-green { background: #7BC99A; }
.resumo-box { background: #FFFBF5; border: 1px solid #F0D8B0; border-radius: var(--r); padding: 14px 16px; margin-bottom: 1rem; font-size: 13px; line-height: 1.7; }
.resumo-titulo { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.spin-box { background: #F0F7F3; border: 1px solid #B8DCC8; border-radius: var(--r); padding: 14px 16px; margin-bottom: 1rem; font-size: 13px; line-height: 1.7; }
.spin-titulo { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #2D5F3F; font-weight: 600; margin-bottom: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid rgba(245,243,238,0.3); border-top-color: #F5F3EE; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.hist-titulo { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
.hist-item { border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; margin-bottom: 10px; }
.hist-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.hist-data { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
.hist-quem { font-size: 11px; background: var(--surface2); border-radius: 4px; padding: 2px 8px; font-weight: 500; }
.hist-bloco { margin-bottom: 7px; }
.hist-bloco-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
.hist-bloco-texto { font-size: 13px; line-height: 1.6; }
.hist-eles { padding-left: 10px; border-left: 2px solid var(--border); color: var(--muted); }
.hist-proximo { margin-top: 8px; font-size: 12px; color: var(--accent2); font-weight: 500; }
.nova-form { background: var(--surface2); border-radius: var(--r); padding: 14px; margin-top: 1rem; }
.nova-form-titulo { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.fg-3 { grid-template-columns: 1fr 1fr 1fr; }
.field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px; font-size: 13px; color: var(--text); outline: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
.add-form-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 1.5rem; display: none; }
.add-form-titulo { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; color: var(--muted); }
@media (max-width: 600px) { .fg, .fg-3 { grid-template-columns: 1fr; } .metrics-bar { grid-template-columns: repeat(3, 1fr); } .metric { border-right: none; border-bottom: 1px solid var(--border); } }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Innovation Meeting Brasil</div>
    <div class="login-title">CRM de Patrocínios</div>
    <div class="login-sub">Digite a senha para acessar</div>
    <input type="password" id="senha-input" placeholder="••••••••••" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div>
      <div class="header-logo">CRM · Innovation Meeting Brasil</div>
      <div class="header-sub">Gestão de patrocínios 2026</div>
    </div>
    <button class="btn-logout" onclick="sair()">Sair</button>
  </div>
  <div class="metrics-bar" id="metrics"></div>
  <div class="toolbar">
    <div class="toolbar-left">
      <select id="fil-status" onchange="render()">
        <option value="">Todos os status</option>
        <option value="identificada">Identificada</option>
        <option value="abordada">Abordada</option>
        <option value="em-negociacao">Em negociação</option>
        <option value="proposta">Proposta enviada</option>
        <option value="fechada">Fechada</option>
        <option value="perdida">Perdida</option>
      </select>
      <select id="fil-resp" onchange="render()">
        <option value="">Todos os responsáveis</option>
        <option>André</option><option>Gabriel</option><option>Giovanna</option>
      </select>
      <input type="text" id="fil-busca" placeholder="Buscar empresa..." oninput="render()" style="min-width:160px;"/>
    </div>
    <button class="btn-primary" onclick="toggleAddForm()">+ Adicionar empresa</button>
  </div>
  <div class="add-form-wrap" id="addFormWrap">
    <div class="add-form-titulo">Nova empresa</div>
    <div class="fg">
      <div class="field"><label>Empresa *</label><input id="f-empresa" placeholder="Nome da empresa"/></div>
      <div class="field"><label>Contato na empresa</label><input id="f-contato" placeholder="Nome do contato"/></div>
    </div>
    <div class="fg">
      <div class="field"><label>Telefone / WhatsApp</label><input type="tel" id="f-telefone" placeholder="(11) 99999-9999"/></div>
      <div class="field"><label>E-mail</label><input type="email" id="f-email" placeholder="contato@empresa.com.br"/></div>
    </div>
    <div class="fg fg-3" style="margin-bottom:12px;">
      <div class="field"><label>Segmento</label>
        <select id="f-segmento">
          <option value="">— segmento —</option>
          <option>Serviços Financeiros</option><option>Indústrias</option><option>Varejo e Atacado</option>
          <option>Comércio Eletrônico</option><option>Saúde</option><option>Energia e Utilities</option>
          <option>Agronegócio</option><option>Educação</option><option>Transporte e Logística</option>
          <option>Construção Civil e Imobiliária</option><option>Tecnologia</option><option>Outro</option>
        </select>
      </div>
      <div class="field"><label>Responsável</label>
        <select id="f-resp-form">
          <option value="">— responsável —</option>
          <option>André</option><option>Gabriel</option><option>Giovanna</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          <option value="identificada">Identificada</option><option value="abordada">Abordada</option>
          <option value="em-negociacao">Em negociação</option><option value="proposta">Proposta enviada</option>
          <option value="fechada">Fechada</option><option value="perdida">Perdida</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" onclick="addEmpresa()">Salvar empresa</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Empresa</th><th>Contato</th><th>Segmento</th><th>Responsável</th><th>Status</th><th>Última interação</th><th></th></tr></thead>
      <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--muted);">Carregando...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-empresa" id="m-empresa"></div>
        <div class="modal-sub" id="m-contato"></div>
        <div class="modal-sub" id="m-contact-info"></div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="status-row">
        <label>Status:</label>
        <select id="m-status" onchange="updateStatus()" style="width:auto;">
          <option value="identificada">Identificada</option><option value="abordada">Abordada</option>
          <option value="em-negociacao">Em negociação</option><option value="proposta">Proposta enviada</option>
          <option value="fechada">Fechada</option><option value="perdida">Perdida</option>
        </select>
      </div>
      <div class="ia-buttons">
        <button class="btn-ia btn-ia-resumo" id="btnResumo" onclick="gerarResumo()">
          <span class="ia-dot"></span><span id="label-resumo">Resumir negociação</span>
        </button>
        <button class="btn-ia btn-ia-spin" id="btnSpin" onclick="gerarSpin()">
          <span class="ia-dot ia-dot-green"></span><span id="label-spin">Como avançar (SPIN)</span>
        </button>
      </div>
      <div id="resumo-box" style="display:none;"></div>
      <div id="spin-box" style="display:none;"></div>
      <div class="hist-titulo">Histórico de interações</div>
      <div id="hist-list"></div>
      <div class="nova-form">
        <div class="nova-form-titulo">Registrar nova interação</div>
        <div class="fg">
          <div class="field"><label>Data</label><input type="date" id="ne-data"/></div>
          <div class="field"><label>Quem fez o contato</label>
            <select id="ne-quem"><option>André</option><option>Gabriel</option><option>Giovanna</option></select>
          </div>
        </div>
        <div class="fg">
          <div class="field"><label>O que a gente disse / fez</label><textarea id="ne-nos" placeholder="Ex: Enviei o mídia kit..."></textarea></div>
          <div class="field"><label>O que o contato respondeu</label><textarea id="ne-eles" placeholder="Ex: Disse que vai levar pro board..."></textarea></div>
        </div>
        <div class="field" style="margin-bottom:12px;"><label>Próximo passo</label><input id="ne-proximo" placeholder="Ex: Ligar na quinta para confirmar interesse"/></div>
        <button class="btn-primary" onclick="addEntry()">Salvar interação</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const SENHA = "GGA13#26imb";
const firebaseConfig = {
  apiKey: "AIzaSyATBNZPaFPX86QWVbN9wbyZnoBC7U6eIR0",
  authDomain: "crm-imb.firebaseapp.com",
  projectId: "crm-imb",
  storageBucket: "crm-imb.firebasestorage.app",
  messagingSenderId: "517332655579",
  appId: "1:517332655579:web:01bf7886207f20c4a79bfe"
};
const STATUS_LABELS = {'identificada':'Identificada','abordada':'Abordada','em-negociacao':'Em negociação','proposta':'Proposta enviada','fechada':'Fechada','perdida':'Perdida'};
const STATUS_ORDER = ['identificada','abordada','em-negociacao','proposta','fechada','perdida'];
let db, data = [], currentId = null;

window.fazerLogin = () => {
  if (document.getElementById('senha-input').value === SENHA) {
    sessionStorage.setItem('imb_auth','1');
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('app').style.display='block';
    iniciar();
  } else {
    document.getElementById('login-error').style.display='block';
    document.getElementById('senha-input').value='';
  }
};
window.sair = () => { sessionStorage.removeItem('imb_auth'); location.reload(); };

function iniciar() {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  onSnapshot(collection(db,'empresas'), snap => {
    data = snap.docs.map(d=>({_id:d.id,...d.data()}));
    data.sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));
    render();
  });
}
if (sessionStorage.getItem('imb_auth')==='1') {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  iniciar();
}

window.toggleAddForm = () => {
  const w = document.getElementById('addFormWrap');
  w.style.display = (w.style.display==='none'||!w.style.display) ? 'block' : 'none';
};

window.addEmpresa = async () => {
  const empresa = document.getElementById('f-empresa').value.trim();
  if (!empresa) { alert('Informe o nome da empresa.'); return; }
  await addDoc(collection(db,'empresas'), {
    empresa, contato: document.getElementById('f-contato').value.trim(),
    telefone: document.getElementById('f-telefone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    segmento: document.getElementById('f-segmento').value,
    resp: document.getElementById('f-resp-form').value,
    status: document.getElementById('f-status').value,
    historico: [], criadoEm: serverTimestamp()
  });
  ['f-empresa','f-contato','f-telefone','f-email'].forEach(id=>document.getElementById(id).value='');
  ['f-segmento','f-resp-form'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='identificada';
  document.getElementById('addFormWrap').style.display='none';
};

window.delRow = async (id) => {
  if (!confirm('Remover esta empresa?')) return;
  await deleteDoc(doc(db,'empresas',id));
};

window.openModal = (id) => {
  currentId = id;
  const row = data.find(d=>d._id===id); if(!row) return;
  document.getElementById('m-empresa').textContent = row.empresa;
  document.getElementById('m-contato').textContent = row.contato||'';
  const ci = document.getElementById('m-contact-info');
  ci.innerHTML = [row.telefone?`<a href="tel:${row.telefone}">${row.telefone}</a>`:'', row.email?`<a href="mailto:${row.email}">${row.email}</a>`:''].filter(Boolean).join(' · ');
  document.getElementById('m-status').value = row.status;
  document.getElementById('ne-data').value = new Date().toISOString().slice(0,10);
  document.getElementById('resumo-box').style.display='none';
  document.getElementById('spin-box').style.display='none';
  document.getElementById('btnResumo').disabled=false;
  document.getElementById('btnSpin').disabled=false;
  document.getElementById('label-resumo').textContent='Resumir negociação';
  document.getElementById('label-spin').textContent='Como avançar (SPIN)';
  renderHist(row);
  document.getElementById('overlay').classList.add('open');
};
window.closeModal = () => { document.getElementById('overlay').classList.remove('open'); currentId=null; };
window.closeOverlay = (e) => { if(e.target===document.getElementById('overlay')) window.closeModal(); };
window.updateStatus = async () => {
  if(!currentId) return;
  await updateDoc(doc(db,'empresas',currentId),{status:document.getElementById('m-status').value});
};
window.addEntry = async () => {
  const row = data.find(d=>d._id===currentId); if(!row) return;
  const nos = document.getElementById('ne-nos').value.trim();
  const eles = document.getElementById('ne-eles').value.trim();
  if (!nos&&!eles) { alert('Registre ao menos o que foi dito.'); return; }
  const hist = [...(row.historico||[]), {
    data: document.getElementById('ne-data').value||new Date().toLocaleDateString('pt-BR'),
    quem: document.getElementById('ne-quem').value, nos, eles,
    proximo: document.getElementById('ne-proximo').value.trim()
  }];
  await updateDoc(doc(db,'empresas',currentId),{historico:hist});
  ['ne-nos','ne-eles','ne-proximo'].forEach(id=>document.getElementById(id).value='');
  renderHist({...row,historico:hist});
};

function buildHist(row) {
  return (row.historico||[]).map((h,i)=>{
    let t=`Interação ${i+1} — ${h.data||'sem data'} — por ${h.quem||'?'}\n`;
    if(h.nos) t+=`Nós: ${h.nos}\n`;
    if(h.eles) t+=`Eles: ${h.eles}\n`;
    if(h.proximo) t+=`Próximo passo: ${h.proximo}\n`;
    return t;
  }).join('\n');
}

async function chamarIA(prompt, btnId, labelId, loadingText) {
  const btn=document.getElementById(btnId), label=document.getElementById(labelId);
  btn.disabled=true;
  label.innerHTML=`<span style="display:inline-flex;align-items:center;gap:6px;"><span class="spinner"></span>${loadingText}</span>`;
  try {
    const res = await fetch('/api/resumo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const json = await res.json();
    return json.texto||'Não foi possível gerar a resposta.';
  } catch(e) { return 'Erro ao conectar com a IA. Tente novamente.'; }
  finally { btn.disabled=false; }
}

window.gerarResumo = async () => {
  const row=data.find(d=>d._id===currentId); if(!row) return;
  if(!row.historico?.length){alert('Nenhuma interação registrada.');return;}
  const prompt=`Você é assistente de vendas do Innovation Meeting Brasil, evento B2B com mais de 150 CIOs, CTOs, CISOs no Enotel Resort Porto de Galinhas, 30 jul a 2 ago 2026.\n\nEmpresa: "${row.empresa}"${row.contato?`, contato: ${row.contato}`:''}${row.email?`, email: ${row.email}`:''}${row.telefone?`, tel: ${row.telefone}`:''}. Status: ${STATUS_LABELS[row.status]}.\n\n${buildHist(row)}\n\nResumo executivo (máx 5 linhas) cobrindo: 1) em que pé está a negociação 2) interesse ou resistência 3) próximo passo urgente. Só o resumo, sem títulos.`;
  const texto=await chamarIA(prompt,'btnResumo','label-resumo','Analisando...');
  document.getElementById('label-resumo').textContent='Resumir negociação';
  const box=document.getElementById('resumo-box');
  box.innerHTML=`<div class="resumo-titulo">Resumo da negociação</div><div>${texto}</div>`;
  box.className='resumo-box'; box.style.display='block';
};

window.gerarSpin = async () => {
  const row=data.find(d=>d._id===currentId); if(!row) return;
  const hist=row.historico?.length?buildHist(row):'Nenhuma interação registrada ainda.';
  const prompt=`Você é especialista em SPIN Selling B2B, auxiliando a equipe do Innovation Meeting Brasil — evento exclusivo de patrocínio com mais de 150 CIOs, CTOs, CISOs no Enotel Resort Porto de Galinhas, 30 jul a 2 ago 2026.\n\nEmpresa: "${row.empresa}" | Contato: ${row.contato||'não informado'} | Email: ${row.email||'não informado'} | Tel: ${row.telefone||'não informado'} | Segmento: ${row.segmento||'não informado'} | Status: ${STATUS_LABELS[row.status]}\n\nHistórico:\n${hist}\n\nResponda em português com:\n1. QUANDO retornar o contato (dia e horário ideal)\n2. PERGUNTAS SPIN para esta situação específica (Situação, Problema, Implicação, Necessidade)\n3. ARGUMENTO PRINCIPAL para avançar com este lead agora\n\nSeja direto e específico para esta empresa.`;
  const texto=await chamarIA(prompt,'btnSpin','label-spin','Calculando estratégia...');
  document.getElementById('label-spin').textContent='Como avançar (SPIN)';
  const box=document.getElementById('spin-box');
  box.innerHTML=`<div class="spin-titulo">Estratégia SPIN Selling</div><div style="white-space:pre-wrap;">${texto}</div>`;
  box.className='spin-box'; box.style.display='block';
};

function renderHist(row) {
  const el=document.getElementById('hist-list');
  if(!row.historico?.length){el.innerHTML='<p style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Nenhuma interação ainda.</p>';return;}
  el.innerHTML=[...row.historico].reverse().map(h=>`
    <div class="hist-item">
      <div class="hist-meta"><span class="hist-data">${h.data||''}</span><span class="hist-quem">${h.quem||''}</span></div>
      ${h.nos?`<div class="hist-bloco"><div class="hist-bloco-label">A gente disse</div><div class="hist-bloco-texto">${h.nos}</div></div>`:''}
      ${h.eles?`<div class="hist-bloco"><div class="hist-bloco-label">Eles responderam</div><div class="hist-bloco-texto hist-eles">${h.eles}</div></div>`:''}
      ${h.proximo?`<div class="hist-proximo">Próximo passo: ${h.proximo}</div>`:''}
    </div>`).join('');
}

function lastInteracao(row) {
  if(!row.historico?.length) return '—';
  const last=row.historico[row.historico.length-1];
  const msg=last.eles||last.nos||'';
  return (last.data?last.data+' · ':'')+msg.slice(0,50)+(msg.length>50?'...':'');
}

window.render = () => {
  const fs=document.getElementById('fil-status').value;
  const fr=document.getElementById('fil-resp').value;
  const fb=document.getElementById('fil-busca').value.toLowerCase();
  const filtered=data.filter(d=>(!fs||d.status===fs)&&(!fr||d.resp===fr)&&(!fb||d.empresa?.toLowerCase().includes(fb)||(d.contato||'').toLowerCase().includes(fb)));
  const counts={};
  STATUS_ORDER.forEach(s=>counts[s]=0);
  data.forEach(d=>{if(counts[d.status]!==undefined)counts[d.status]++;});
  document.getElementById('metrics').innerHTML=STATUS_ORDER.map(s=>`<div class="metric"><div class="metric-label">${STATUS_LABELS[s]}</div><div class="metric-val">${counts[s]}</div></div>`).join('');
  const tb=document.getElementById('tbody');
  if(!filtered.length){tb.innerHTML=`<tr class="empty-row"><td colspan="7">Nenhuma empresa cadastrada ainda.</td></tr>`;return;}
  tb.innerHTML=filtered.map(d=>`
    <tr>
      <td style="font-weight:600;">${d.empresa}</td>
      <td><div>${d.contato||'—'}</div>${d.telefone||d.email?`<div class="contact-info">${[d.telefone?`<a href="tel:${d.telefone}">${d.telefone}</a>`:'',d.email?`<a href="mailto:${d.email}">${d.email}</a>`:''].filter(Boolean).join(' · ')}</div>`:''}</td>
      <td style="color:var(--muted);">${d.segmento||'—'}</td>
      <td>${d.resp||'—'}</td>
      <td><span class="badge b-${d.status}">${STATUS_LABELS[d.status]}</span></td>
      <td style="font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${lastInteracao(d)}</td>
      <td style="white-space:nowrap;"><button class="btn-ver" onclick="openModal('${d._id}')">ver</button> <button class="btn-del" onclick="delRow('${d._id}')">✕</button></td>
    </tr>`).join('');
};
</script>
